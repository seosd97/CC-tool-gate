# Static rules — evaluated before the LLM. No policy matching needed.
#
# - deny: ALWAYS deny. The LLM is never consulted.
# - allow: ALWAYS allow. Use sparingly; this bypasses every policy.
#
# Each block accepts:
#   tool_names: list of tool names that match
#   patterns:   list of regex patterns matched (case-insensitive) against the
#               flattened tool_input.

deny:
  tool_names: []
  patterns:
    # Catastrophic shell commands. Block at the gate even if no policy fires.
    - "rm\\s+-rf?\\s+/(\\s|$)"
    - "rm\\s+-rf?\\s+/\\*"
    - ":\\(\\)\\s*\\{\\s*:\\|:&\\s*\\};:" # classic fork bomb
    - "mkfs\\."
    - "dd\\s+if=.*of=/dev/(sd|nvme|disk)"
    - "shutdown\\s+(-h|now)"

allow:
  tool_names: []
  patterns: []
